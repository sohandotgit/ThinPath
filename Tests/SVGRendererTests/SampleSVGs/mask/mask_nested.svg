<!--
Golden case: a mask applied to an element that is itself inside a masked group
(mask-of-mask), stacking two isolation layers + two scratch mask surfaces
(Compositing.md §6 PROFILE-CHECK nested-mask). Correctness: the visible result
is the PRODUCT of both masks' alpha, so the surviving region is the
intersection of the outer circle mask and the inner gradient mask.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#222222"/>
  <defs>
    <mask id="outer" maskUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="45" fill="#FFFFFF"/>
    </mask>
    <linearGradient id="ig" x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <mask id="inner" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="100" fill="url(#ig)"/>
    </mask>
  </defs>
  <g mask="url(#outer)">
    <rect x="0" y="0" width="100" height="100" fill="#1E90FF" mask="url(#inner)"/>
  </g>
</svg>
