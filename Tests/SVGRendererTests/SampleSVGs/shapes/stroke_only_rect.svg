<!--
Exact spot-pixel case: fill="none" + stroke, to confirm stroke geometry is centered
on the path (half stroke-width each side of the edge) and fill is truly absent.
Rect edges at x=20 and x=60 (etc.), stroke-width=10 -> stroke band is [15,25] on
each edge, half in half out.
  - (40,40) center, 20px from every edge (> half-stroke-width 5) -> exactly white
    background #FFFFFFFF (confirms fill="none" leaves the interior untouched).
  - (20,40) sits exactly on the left edge, far from any corner -> exactly
    #FF0000FF (deep inside the stroke band).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#FFFFFF"/>
  <rect x="20" y="20" width="40" height="40" fill="none" stroke="#FF0000" stroke-width="10"/>
</svg>
