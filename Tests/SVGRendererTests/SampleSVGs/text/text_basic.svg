<!--
Golden case: basic single-run text. Glyph rasterization is font/hinting
dependent across renderers, so this is a tolerance-based golden, not a
spot-pixel test.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <rect x="0" y="0" width="200" height="60" fill="#FFFFFF"/>
  <text x="10" y="40" font-family="Helvetica" font-size="32" fill="#000000">Hamburg</text>
</svg>
