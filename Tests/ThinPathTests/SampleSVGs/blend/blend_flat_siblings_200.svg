<!--
T-B-M3 (fixture A): 200 flat sibling rects, each with a distinct mix-blend-mode,
no nesting. Each sibling opens and closes its own isolation layer in turn, so
peakLayerDepth must be 1 regardless of N — proving peak concurrent layers is
independent of the blended-element COUNT (Design/blend-modes.md §8).
-->
