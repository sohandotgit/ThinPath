<!--
T-B1b: the decisive begin-time-capture case. Backdrop D=(0,255,0) green,
source S=(255,0,0) red, mix-blend-mode="multiply".
multiply=(255*0/255, 0*255/255, 0*0/255) = (0,0,0) black. If CG blended at
the wrong time (or children drew WITH the blend mode instead of the layer
composite applying it), red-over-green would not be black.
  - (50,50) -> #000000FF, tolerance 0.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#00FF00"/>
  <rect x="20" y="20" width="60" height="60" fill="#FF0000" mix-blend-mode="multiply"/>
</svg>
