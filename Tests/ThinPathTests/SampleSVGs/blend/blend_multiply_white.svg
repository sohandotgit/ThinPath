<!--
T-B1a: multiply over white is the identity (multiply(S,D)=S*D/255, D=255 ->
result=S). Backdrop D=(255,255,255) white, source S=(255,0,0) red.
multiply(255,0,0 over white) = (255,0,0).
  - (50,50) -> #FF0000FF, tolerance 0.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#FFFFFF"/>
  <rect x="20" y="20" width="60" height="60" fill="#FF0000" mix-blend-mode="multiply"/>
</svg>
