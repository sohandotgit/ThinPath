<!--
T-B8: a blend mode does not leak to later siblings. Backdrop D=(255,255,0)
yellow. (1) backdrop. (2) rect B=(0,0,255) blue, mix-blend-mode="multiply"
(exercises a real blend). (3) rect C=(80,160,240), NO blend attribute,
drawn after B, in a disjoint region. If B's blend mode leaked past its own
layer (gstate restore skipped), C would render as
multiply(C, yellow-backdrop) = (80,160,0) — a visibly different, wrong
blue channel. Correct (no leak): plain src-over of opaque C = C's own
color exactly, (80,160,240).
  - C sample (75,75) -> #50A0F0FF (80,160,240), tolerance 0.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#FFFF00"/>
  <rect x="10" y="10" width="30" height="30" fill="#0000FF" mix-blend-mode="multiply"/>
  <rect x="60" y="60" width="30" height="30" fill="#50A0F0"/>
</svg>
