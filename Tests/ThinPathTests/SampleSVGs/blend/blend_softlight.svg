<!--
soft-light exact anchor + DOCUMENTED DIVERGENCE. D=#808080 (0.5), S=#FF0000.
The W3C CSS Compositing formula gives (181,64,64); Core Graphics' .softLight
gives (192,64,64) — a ~11/255 (~4%) difference on the R channel. ThinPath uses
CG's blend, so the test pins CG's actual value (192,64,64) as a regression guard
and the docs record soft-light as a known non-conformance. Sample (50,50).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#808080"/>
  <rect x="20" y="20" width="60" height="60" fill="#FF0000" mix-blend-mode="soft-light"/>
</svg>
