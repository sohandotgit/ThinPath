<!--
Golden case: objectBoundingBox gradient units (the default) — the gradient's
[0,1] coordinate space maps onto each rect's own bounding box, so the two
differently-sized/positioned rects below must show the SAME left-to-right
red->blue ramp *relative to their own bounds*, not a shared absolute ramp.
Exercises PaintCoordinateSpace / ObjectBoundingBox.transform (Compositing.md §3).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="140" height="100" viewBox="0 0 140 100">
  <rect x="0" y="0" width="140" height="100" fill="#FFFFFF"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF0000"/>
      <stop offset="1" stop-color="#0000FF"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="50" height="30" fill="url(#g)"/>
  <rect x="70" y="50" width="60" height="40" fill="url(#g)"/>
</svg>
