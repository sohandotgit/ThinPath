<!--
Golden case: a basic 2-color checkerboard pattern (userSpaceOnUse, 20x20 tile)
filling a rect, exercising CGPattern tiling (Compositing.md §4).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <rect x="0" y="0" width="100" height="100" fill="#FFFFFF"/>
  <defs>
    <pattern id="p" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="20" height="20" fill="#FFFFFF"/>
      <rect x="0" y="0" width="10" height="10" fill="#2E8B57"/>
      <rect x="10" y="10" width="10" height="10" fill="#2E8B57"/>
    </pattern>
  </defs>
  <rect x="10" y="10" width="80" height="80" fill="url(#p)"/>
</svg>
